name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build executable
        shell: pwsh
        run: .\build.ps1

      - name: Smoke test executable
        shell: pwsh
        run: .\dist\SpiritAutoSelector.exe --smoke-test

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpiritAutoSelector-windows-x64
          path: dist/SpiritAutoSelector.exe
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (gh release view $env:GITHUB_REF_NAME 2>$null) {
            gh release upload $env:GITHUB_REF_NAME dist/SpiritAutoSelector.exe --clobber
          } else {
            gh release create $env:GITHUB_REF_NAME dist/SpiritAutoSelector.exe --generate-notes --title $env:GITHUB_REF_NAME
          }
